<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computation Rules Workbook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181a22;
  --surface2: #1e2029;
  --border: #2a2d3a;
  --text: #e2e4ea;
  --text2: #8b8fa3;
  --accent: #4a9eff;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); padding:24px; max-width:1400px; margin:0 auto; }
h1 { font-size:28px; font-weight:700; margin-bottom:8px; letter-spacing:-0.5px; }
.subtitle { color:var(--text2); font-size:14px; margin-bottom:32px; }
.area-nav { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:32px; position:sticky; top:0; background:var(--bg); padding:12px 0; z-index:10; border-bottom:1px solid var(--border); }
.area-nav button { background:var(--surface); border:1px solid var(--border); color:var(--text2); padding:8px 16px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:13px; transition:all 0.2s; }
.area-nav button:hover { border-color:var(--accent); color:var(--text); }
.area-nav button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.area-nav button .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:6px; }
.area-nav button .status-dot.complete { background:var(--green); }
.area-nav button .status-dot.partial { background:var(--yellow); }
.area-nav button .status-dot.empty { background:var(--border); }
.area-section { display:none; }
.area-section.active { display:block; }
.area-header { margin-bottom:24px; padding:16px 20px; background:var(--surface); border-radius:10px; border:1px solid var(--border); }
.area-title { font-size:20px; font-weight:700; }
.item-block { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:16px; overflow:hidden; }
.item-title { padding:14px 20px; font-size:15px; font-weight:500; cursor:pointer; user-select:none; display:flex; align-items:center; gap:8px; }
.item-title:hover { background:var(--surface2); }
.item-title .type-badge { font-size:11px; font-family:'JetBrains Mono',monospace; padding:3px 8px; border-radius:4px; text-transform:uppercase; }
.type-badge.data { background:#1a3a2a; color:var(--green); }
.type-badge.checklist { background:#1a2a3a; color:var(--accent); }
.type-badge.comparative { background:#3a2a1a; color:var(--orange); }
.expand-icon { color:var(--text2); font-size:16px; transition:transform 0.2s; }
.expand-icon.rotated { transform:rotate(90deg); }
.sub-rows { display:none; border-top:1px solid var(--border); }
.sub-rows.open { display:block; }
.comp-row { padding:12px 20px; border-bottom:1px solid var(--border); }
.comp-row:last-child { border-bottom:none; }
.comp-row .row-name { font-size:13px; font-weight:500; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.comp-row .row-name .si-type { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text2); }
.comp-fields { display:grid; grid-template-columns:1fr 2fr 1fr 1fr; gap:10px; }
.comp-fields label { font-size:11px; color:var(--text2); display:block; margin-bottom:3px; text-transform:uppercase; letter-spacing:0.5px; }
.comp-fields select, .comp-fields input, .comp-fields textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 8px; border-radius:4px; font-family:'DM Sans',sans-serif; font-size:12px; }
.comp-fields select:focus, .comp-fields input:focus, .comp-fields textarea:focus { outline:none; border-color:var(--accent); }
.comp-fields textarea { resize:vertical; min-height:32px; }
.decision-flag { background:#3a2a1a; color:var(--orange); font-size:11px; font-family:'JetBrains Mono',monospace; padding:2px 6px; border-radius:3px; }
.export-bar { position:fixed; bottom:20px; right:20px; display:flex; gap:8px; align-items:center; z-index:100; }
.export-bar button, .export-bar label { background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; box-shadow:0 4px 20px rgba(74,158,255,0.3); }
.export-bar button:hover, .export-bar label:hover { filter:brightness(1.1); }
.save-status { font-size:11px; color:var(--green); font-family:'JetBrains Mono',monospace; background:var(--surface); padding:6px 10px; border-radius:6px; border:1px solid var(--border); opacity:0; transition:opacity 0.3s; }
.save-status.visible { opacity:1; }
.save-status.error { color:var(--red); }
</style>
</head>

const SOURCES = ["PM System","Audit Observation","Audit / Management Interview","Audit / Mystery Shop","Mystery Shop","Review Platforms","Comp Research","Owner-Reported + PM System","PM System / CRM","PM System / Marketing Data","PM System / Management Interview","Management Interview","Document Review","Audit / Document Review","Audit Observation / Document Review","Audit Observation / Management Interview","Comp Research + Audit","Calculated","Other"];
const FORMATS = ["Percentage","Count","Dollar Amount","Days","Hours","Minutes","Minutes/Hours","Months","Rating (1-5)","Y/N","Tiered Rating","Ratio","Ratio/Percentage","Dollar per Unit","Dollar Amount / Variance %","Count per week","Days per week","Other"];

function slug(s){return s.replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toLowerCase();}

let _dirty=false;
window.addEventListener('beforeunload',function(e){if(_dirty){e.preventDefault();e.returnValue='';}});

function showSaveStatus(msg,isError){
  const el=document.getElementById('saveStatus');
  el.textContent=msg;
  el.className='save-status visible'+(isError?' error':'');
  clearTimeout(el._timer);
  if(!isError) el._timer=setTimeout(()=>el.classList.remove('visible'),3000);
}

function getState(){
  const state={};
  document.querySelectorAll('select,input[type="text"],textarea').forEach(el=>{
    if(el.value && el.id) state[el.id]=el.value;
  });
  return state;
}

function applyState(state){
  Object.entries(state).forEach(([id,val])=>{
    const el=document.getElementById(id);
    if(el) el.value=val;
  });
}

function saveToFile(){
  const blob=new Blob([JSON.stringify(getState(),null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Computation_Rules_Progress.json';
  a.click();
  _dirty=false;
  showSaveStatus('file downloaded');
}

function loadFromFile(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{const state=JSON.parse(e.target.result);applyState(state);_dirty=false;showSaveStatus('loaded from file');}
    catch(err){alert('Invalid file.');}
  };
  reader.readAsText(file);
}

function exportCSV(){
  let csv='Area,Item,Sub-item,Type,Data Source,Computation Method,Input Format,Notes/Flags\n';
  DATA.forEach(a=>{
    a.items.forEach(item=>{
      const aS=slug(a.area),iS=slug(item.name),key=aS+'__'+iS;
      if(!item.subs){
        const src=document.getElementById('src__'+key)?.value||item.source||'';
        const mth=document.getElementById('mth__'+key)?.value||item.method||'';
        const fmt=document.getElementById('fmt__'+key)?.value||item.format||'';
        const nts=document.getElementById('nts__'+key)?.value||item.flag||'';
        csv+=`"${a.area}","${item.name}","","${item.type}","${src}","${mth.replace(/"/g,'""')}","${fmt}","${nts.replace(/"/g,'""')}"\n`;
      } else {
        item.subs.forEach(s=>{
          const sS=slug(s.name),sk=key+'__'+sS;
          const src=document.getElementById('src__'+sk)?.value||s.source||'';
          const mth=document.getElementById('mth__'+sk)?.value||s.method||'';
          const fmt=document.getElementById('fmt__'+sk)?.value||s.format||'';
          const nts=document.getElementById('nts__'+sk)?.value||s.flag||'';
          csv+=`"${a.area}","${item.name}","${s.name}","${s.type}","${src}","${mth.replace(/"/g,'""')}","${fmt}","${nts.replace(/"/g,'""')}"\n`;
        });
      }
    });
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const dl=document.createElement('a');
  dl.href=URL.createObjectURL(blob);
  dl.download='Computation_Rules.csv';
  dl.click();
}

function markDirty(){_dirty=true;}

function makeSelect(id,options,selected){
  let h=`<select id="${id}" onchange="markDirty()">`;
  h+=`<option value="">—</option>`;
  options.forEach(o=>{h+=`<option value="${o}"${o===selected?' selected':''}>${o}</option>`;});
  h+=`</select>`;
  return h;
}

function buildRow(item,keyPrefix){
  const key=keyPrefix+'__'+slug(item.name);
  const flag=item.flag?`<span class="decision-flag">DECISION NEEDED</span>`:'';
  let h=`<div class="comp-row"><div class="row-name">${item.name} <span class="si-type">${item.type}</span> ${flag}</div>`;
  h+=`<div class="comp-fields">`;
  h+=`<div><label>Data Source</label>${makeSelect('src__'+key,SOURCES,item.source||'')}</div>`;
  h+=`<div><label>Computation Method</label><textarea id="mth__${key}" oninput="markDirty()" placeholder="How is this value calculated?">${item.method||''}</textarea></div>`;
  h+=`<div><label>Input Format</label>${makeSelect('fmt__'+key,FORMATS,item.format||'')}</div>`;
  h+=`<div><label>Notes / Flags</label><textarea id="nts__${key}" oninput="markDirty()" placeholder="Decisions needed, special handling...">${item.flag||''}</textarea></div>`;
  h+=`</div></div>`;
  return h;
}

function init(){
  const nav=document.getElementById('areaNav');
  const sections=document.getElementById('areaSections');
  DATA.forEach((a,ai)=>{
    const aS=slug(a.area);
    const btn=document.createElement('button');
    btn.textContent=a.area.replace(/^\d+\.\s*/,'');
    btn.innerHTML+='<span class="status-dot empty"></span>';
    btn.onclick=()=>showArea(ai);
    btn.dataset.ai=ai;
    nav.appendChild(btn);

    let h=`<div class="area-header"><div class="area-title">${a.area}</div></div>`;
    a.items.forEach((item,ii)=>{
      const iS=slug(item.name);
      const key=aS+'__'+iS;
      h+=`<div class="item-block">`;
      if(item.subs){
        h+=`<div class="item-title" onclick="toggleSubs('${key}')"><span class="expand-icon" id="exp-${key}">▶</span>${item.name} <span class="type-badge ${item.type.toLowerCase()}">${item.type}</span></div>`;
        h+=`<div class="sub-rows" id="subs-${key}">`;
        item.subs.forEach(s=>{h+=buildRow(s,key);});
        h+=`</div>`;
      } else {
        h+=`<div class="item-title" onclick="toggleSubs('${key}')"><span class="expand-icon" id="exp-${key}">▶</span>${item.name} <span class="type-badge ${item.type.toLowerCase()}">${item.type}</span>${item.flag?'<span class="decision-flag" style="margin-left:8px">DECISION NEEDED</span>':''}</div>`;
        h+=`<div class="sub-rows" id="subs-${key}">${buildRow(item,aS)}</div>`;
      }
      h+=`</div>`;
    });

    const sec=document.createElement('div');
    sec.className='area-section';
    sec.id='area-'+ai;
    sec.innerHTML=h;
    sections.appendChild(sec);
  });
  showArea(0);
}

function showArea(ai){
  document.querySelectorAll('.area-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.area-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('area-'+ai).classList.add('active');
  document.querySelector(`[data-ai="${ai}"]`).classList.add('active');
}

function toggleSubs(key){
  const el=document.getElementById('subs-'+key);
  const icon=document.getElementById('exp-'+key);
  if(!el) return;
  el.classList.toggle('open');
  if(icon) icon.classList.toggle('rotated');
}

init();
</script>
