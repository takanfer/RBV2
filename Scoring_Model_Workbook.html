<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Model Workbook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181a22;
  --surface2: #1e2029;
  --border: #2a2d3a;
  --text: #e2e4ea;
  --text2: #8b8fa3;
  --accent: #4a9eff;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); padding:24px; max-width:1200px; margin:0 auto; }
h1 { font-size:28px; font-weight:700; margin-bottom:8px; letter-spacing:-0.5px; }
.subtitle { color:var(--text2); font-size:14px; margin-bottom:32px; }
.area-nav { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:32px; position:sticky; top:0; background:var(--bg); padding:12px 0; z-index:10; border-bottom:1px solid var(--border); }
.area-nav button { background:var(--surface); border:1px solid var(--border); color:var(--text2); padding:8px 16px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:13px; transition:all 0.2s; }
.area-nav button:hover { border-color:var(--accent); color:var(--text); }
.area-nav button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.area-nav button .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:6px; }
.area-nav button .status-dot.complete { background:var(--green); }
.area-nav button .status-dot.partial { background:var(--yellow); }
.area-nav button .status-dot.empty { background:var(--border); }
.area-section { display:none; }
.area-section.active { display:block; }
.area-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding:16px 20px; background:var(--surface); border-radius:10px; border:1px solid var(--border); }
.area-title { font-size:20px; font-weight:700; }
.area-weight-box { display:flex; align-items:center; gap:12px; }
.area-weight-box label { font-size:13px; color:var(--text2); }
.area-weight-box input { width:70px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:14px; text-align:right; }
.area-weight-box input:focus { outline:none; border-color:var(--accent); }
.overall-status { font-family:'JetBrains Mono',monospace; font-size:13px; padding:4px 10px; border-radius:4px; }
.item-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:16px; overflow:hidden; }
.item-header { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; cursor:pointer; user-select:none; }
.item-header:hover { background:var(--surface2); }
.item-name { font-size:15px; font-weight:500; }
.item-type-badge { font-size:11px; font-family:'JetBrains Mono',monospace; padding:3px 8px; border-radius:4px; text-transform:uppercase; }
.item-type-badge.data { background:#1a3a2a; color:var(--green); }
.item-type-badge.checklist { background:#1a2a3a; color:var(--accent); }
.item-type-badge.comparative { background:#3a2a1a; color:var(--orange); }
.item-right { display:flex; align-items:center; gap:12px; }
.item-weight-input { width:60px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:13px; text-align:right; }
.item-weight-input:focus { outline:none; border-color:var(--accent); }
.weight-label { font-size:11px; color:var(--text2); }
.item-status { font-size:12px; font-family:'JetBrains Mono',monospace; min-width:50px; text-align:right; }
.sub-items { display:none; border-top:1px solid var(--border); padding:12px 20px; }
.sub-items.open { display:block; }
.sub-items table { width:100%; border-collapse:collapse; }
.sub-items th { text-align:left; font-size:11px; color:var(--text2); font-weight:500; padding:6px 8px; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:0.5px; }
.sub-items td { padding:8px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:top; }
.sub-items tr:last-child td { border-bottom:none; }
.sub-items .si-name { font-weight:400; max-width:280px; }
.sub-items .si-type { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text2); }
.sub-items .si-tiers { font-size:11px; color:var(--text2); max-width:300px; line-height:1.5; }
.sub-items .si-v6 { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); text-align:right; }
.sub-items .si-pts input { width:50px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:4px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:12px; text-align:right; }
.sub-items .si-pts input:focus { outline:none; border-color:var(--accent); }
.sub-total-row { background:var(--surface2); border-radius:6px; margin-top:8px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; font-size:13px; }
.sub-total-row .total-label { color:var(--text2); }
.sub-total-row .total-value { font-family:'JetBrains Mono',monospace; font-weight:700; }
.item-weight-total { display:flex; justify-content:flex-end; align-items:center; gap:8px; padding:12px 20px; margin-top:8px; font-size:13px; }
.item-weight-total .label { color:var(--text2); }
.item-weight-total .value { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; }
.expand-icon { color:var(--text2); font-size:16px; margin-right:8px; transition:transform 0.2s; }
.expand-icon.rotated { transform:rotate(90deg); }
.tbd-notice { padding:16px; color:var(--yellow); font-size:13px; font-style:italic; }
.export-bar { position:fixed; bottom:20px; right:20px; display:flex; gap:8px; align-items:center; z-index:100; }
.export-bar button { background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; box-shadow:0 4px 20px rgba(74,158,255,0.3); }
.export-bar button:hover { filter:brightness(1.1); }
.save-status { font-size:11px; color:var(--green); font-family:'JetBrains Mono',monospace; background:var(--surface); padding:6px 10px; border-radius:6px; border:1px solid var(--border); opacity:0; transition:opacity 0.3s; }
.save-status.visible { opacity:1; }
.save-status.error { color:var(--red); }
</style>
</head>
<body>

<p class="subtitle">Work through each area. Fill in weights (must sum to 100% per level) and sub-item points (must sum to 100 per checklist item).</p>

function slug(s) { return s.replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toLowerCase(); }

function init() {
  const nav = document.getElementById('areaNav');
  const sections = document.getElementById('areaSections');
  DATA.forEach((a, ai) => {
    const aSlug = slug(a.area);
    const btn = document.createElement('button');
    btn.textContent = a.area.replace(/^\d+\.\s*/,'');
    btn.innerHTML += '<span class="status-dot empty"></span>';
    btn.onclick = () => showArea(ai);
    btn.dataset.ai = ai;
    nav.appendChild(btn);

    const sec = document.createElement('div');
    sec.className = 'area-section';
    sec.id = 'area-'+ai;
    sec.innerHTML = buildAreaHTML(a, ai, aSlug);
    sections.appendChild(sec);
  });
  showArea(0);
  loadFromLocal();
  if (!_lsWorks) {
    document.getElementById('saveStatus').textContent = 'AUTO-SAVE UNAVAILABLE — use Save to File!';
    document.getElementById('saveStatus').className = 'save-status visible error';
  }
}

function buildAreaHTML(a, ai, aSlug) {
  let h = `<div class="area-header">
    <div><div class="area-title">${a.area}</div><div style="color:var(--text2);font-size:13px;margin-top:4px">${a.question}</div></div>
    <div class="area-weight-box">
      <label>Area Weight %</label>
      <input type="number" min="0" max="100" step="0.5" id="aw__${aSlug}" oninput="updateAreaWeight()" placeholder="—">
      <span class="overall-status" id="aw-status-${ai}"></span>
    </div>
  </div>`;

  a.items.forEach((item, ii) => {
    const iSlug = slug(item.name);
    const key = aSlug+'__'+iSlug;
    const badge = item.type.toLowerCase();
    const hasSubs = item.subs && item.subs.length > 0 && item.subs[0].type !== 'TBD';
    const isTBD = item.subs && item.subs.length > 0 && item.subs[0].type === 'TBD';

    h += `<div class="item-card">
      <div class="item-header" onclick="toggleSubs('${key}')">
        <div style="display:flex;align-items:center">
          ${item.subs ? '<span class="expand-icon" id="exp-'+key+'">▶</span>' : '<span style="width:24px;display:inline-block"></span>'}
          <span class="item-name">${item.name}</span>
          ${item.v6Ref ? '<span style="font-size:11px;color:var(--text2);margin-left:12px">'+item.v6Ref+'</span>' : ''}
        </div>
        <div class="item-right">
          <span class="item-type-badge ${badge}">${item.type}</span>
          <div><input class="item-weight-input" type="number" min="0" max="100" step="0.5" id="iw__${key}" oninput="updateItemWeight(${ai})" placeholder="—" onclick="event.stopPropagation()"><div class="weight-label">weight %</div></div>
          ${hasSubs ? '<span class="item-status" id="is-'+key+'"></span>' : ''}
        </div>
      </div>`;

    if (hasSubs) {
      h += `<div class="sub-items" id="subs-${key}"><table>
        <tr><th style="width:35%">Sub-item</th><th style="width:8%">Type</th><th style="width:32%">Tiers / Details</th><th style="width:10%">V6 Pts</th><th style="width:15%">Your Points</th></tr>`;
      item.subs.forEach((s, si) => {
        const sSlug = slug(s.name);
        h += `<tr>
          <td class="si-name">${s.name}</td>
          <td class="si-type">${s.type}</td>
          <td class="si-tiers">${s.tiers||'—'}</td>
          <td class="si-v6">${s.v6||'—'}</td>
          <td class="si-pts"><input type="number" min="0" max="100" step="1" id="sp__${key}__${sSlug}" oninput="updateSubPoints('${key}',${ai},${ii})" placeholder="—"></td>
        </tr>`;
      });
      h += `</table><div class="sub-total-row"><span class="total-label">Points Total (must = 100)</span><span class="total-value" id="st-${key}">0 / 100</span></div></div>`;
    } else if (isTBD) {
      h += `<div class="sub-items" id="subs-${key}"><div class="tbd-notice">⚠ Sub-items need to be defined for this checklist item</div></div>`;
    }
    h += '</div>';
  });

  h += `<div class="item-weight-total"><span class="label">Item Weights Total (must = 100%)</span><span class="value" id="iwt-${ai}">0%</span></div>`;
  return h;
}

function showArea(ai) {
  document.querySelectorAll('.area-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.area-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('area-'+ai).classList.add('active');
  document.querySelector(`[data-ai="${ai}"]`).classList.add('active');
}

function toggleSubs(key) {
  const el = document.getElementById('subs-'+key);
  const icon = document.getElementById('exp-'+key);
  if (!el) return;
  el.classList.toggle('open');
  if (icon) icon.classList.toggle('rotated');
}

function updateAreaWeight() {
  let total = 0;
  DATA.forEach((a) => {
    const v = parseFloat(document.getElementById('aw__'+slug(a.area))?.value) || 0;
    total += v;
  });
  DATA.forEach((_, i) => {
    const el = document.getElementById('aw-status-'+i);
    if (el) {
      el.textContent = total.toFixed(1) + '%';
      el.style.color = Math.abs(total - 100) < 0.01 ? 'var(--green)' : total > 100 ? 'var(--red)' : 'var(--yellow)';
    }
  });
  updateNavDots();
  autoSave();
}

function updateItemWeight(ai) {
  const aSlug = slug(DATA[ai].area);
  let total = 0;
  DATA[ai].items.forEach((item) => {
    total += parseFloat(document.getElementById('iw__'+aSlug+'__'+slug(item.name))?.value) || 0;
  });
  const el = document.getElementById('iwt-'+ai);
  if (el) {
    el.textContent = total.toFixed(1) + '%';
    el.style.color = Math.abs(total - 100) < 0.01 ? 'var(--green)' : total > 100 ? 'var(--red)' : 'var(--yellow)';
  }
  updateNavDots();
  autoSave();
}

function updateSubPoints(key, ai, ii) {
  const item = DATA[ai].items[ii];
  if (!item.subs) return;
  let total = 0;
  item.subs.forEach((s) => {
    total += parseFloat(document.getElementById('sp__'+key+'__'+slug(s.name))?.value) || 0;
  });
  const el = document.getElementById('st-'+key);
  if (el) {
    el.textContent = total + ' / 100';
    el.style.color = total === 100 ? 'var(--green)' : total > 100 ? 'var(--red)' : 'var(--yellow)';
  }
  const status = document.getElementById('is-'+key);
  if (status) {
    status.textContent = total === 100 ? '✓' : total + '/100';
    status.style.color = total === 100 ? 'var(--green)' : 'var(--yellow)';
  }
  updateNavDots();
  autoSave();
}

function updateNavDots() {
  DATA.forEach((a, ai) => {
    const aSlug = slug(a.area);
    const btn = document.querySelector(`[data-ai="${ai}"]`);
    const dot = btn?.querySelector('.status-dot');
    if (!dot) return;
    const aw = parseFloat(document.getElementById('aw__'+aSlug)?.value) || 0;
    let iwTotal = 0;
    let iwFilled = 0;
    a.items.forEach((item) => {
      const v = parseFloat(document.getElementById('iw__'+aSlug+'__'+slug(item.name))?.value) || 0;
      iwTotal += v;
      if (v > 0) iwFilled++;
    });
    dot.className = 'status-dot';
    if (aw > 0 && Math.abs(iwTotal - 100) < 0.01) dot.classList.add('complete');
    else if (aw > 0 || iwFilled > 0) dot.classList.add('partial');
    else dot.classList.add('empty');
  });
}

let _dirty = false;
let _lsWorks = false;

window.addEventListener('beforeunload', function(e) {
  if (_dirty) { e.preventDefault(); e.returnValue = ''; }
});

(function testLS() {
  try { localStorage.setItem('_test','1'); localStorage.removeItem('_test'); _lsWorks = true; } catch(e) { _lsWorks = false; }
})();

function getState() {
  const state = {};
  document.querySelectorAll('input[type="number"]').forEach(inp => {
    if (inp.value) state[inp.id] = inp.value;
  });
  return state;
}

function showSaveStatus(msg, isError) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = 'save-status visible' + (isError ? ' error' : '');
  clearTimeout(el._timer);
  if (!isError) el._timer = setTimeout(() => el.classList.remove('visible'), 3000);
}

function autoSave() {
  _dirty = true;
  if (_lsWorks) {
    try {
      localStorage.setItem('scoringWorkbook', JSON.stringify(getState()));
      showSaveStatus('auto-saved');
    } catch(e) {
      showSaveStatus('SAVE TO FILE — localStorage broken', true);
    }
  } else {
    showSaveStatus('localStorage unavailable — SAVE TO FILE regularly!', true);
  }
}

function saveToFile() {
  const blob = new Blob([JSON.stringify(getState(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Scoring_Workbook_Progress.json';
  a.click();
  _dirty = false;
  showSaveStatus('file downloaded');
}

function loadFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const state = JSON.parse(e.target.result);
      applyState(state);
      _dirty = false;
      showSaveStatus('loaded from file');
    } catch(err) { alert('Invalid file.'); }
  };
  reader.readAsText(file);
}

function applyState(state) {
  Object.entries(state).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.value = val;
  });
  updateAreaWeight();
  DATA.forEach((_, ai) => { updateItemWeight(ai); });
  DATA.forEach((a, ai) => a.items.forEach((item, ii) => {
    const aSlug = slug(a.area);
    const key = aSlug+'__'+slug(item.name);
    if (item.subs && item.subs[0]?.type !== 'TBD') updateSubPoints(key, ai, ii);
  }));
}

function loadFromLocal() {
  if (!_lsWorks) return;
  try {
    const raw = localStorage.getItem('scoringWorkbook');
    if (raw) applyState(JSON.parse(raw));
  } catch(e) {}
}

function exportCSV() {
  let csv = 'Area,Item,Sub-item,Input Type,Area Weight %,Item Weight %,Sub-item Points,Tier Definition,V6 Reference\n';
  DATA.forEach((a) => {
    const aSlug = slug(a.area);
    const aw = document.getElementById('aw__'+aSlug)?.value || '';
    a.items.forEach((item) => {
      const iSlug = slug(item.name);
      const key = aSlug+'__'+iSlug;
      const iw = document.getElementById('iw__'+key)?.value || '';
      if (!item.subs || item.subs[0]?.type === 'TBD') {
        csv += `"${a.area}","${item.name}","","${item.type}","${aw}","${iw}","","",""\n`;
      } else {
        item.subs.forEach((s) => {
          const sp = document.getElementById('sp__'+key+'__'+slug(s.name))?.value || '';
          csv += `"${a.area}","${item.name}","${s.name}","${s.type}","${aw}","${iw}","${sp}","${(s.tiers||'').replace(/"/g,'""')}","${s.v6||''}"\n`;
        });
      }
    });
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const dl = document.createElement('a');
  dl.href = URL.createObjectURL(blob);
  dl.download = 'Scoring_Model_Workbook.csv';
  dl.click();
}

init();
</script>
